# Default values for contrast-vulnerable-services.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

workshopBaseUrl: "workshop.contrastdemo.com"

mysql:
  # Uses a pull-through cache rule in ECR to pull the official MySQL image from Docker Hub
  # NOTE: This only works in eu-west-1 region for now
  # TODO: Implement the ECR pull-through-cache rules in other regions
  image: 771960604435.dkr.ecr.eu-west-1.amazonaws.com/dockerhub-images/library/mysql:9
  rootPassword: cargocats
  database: db
  user: cargocats
  password: cargocats

cargocatsDataservice:
  image: 771960604435.dkr.ecr.eu-west-1.amazonaws.com/workshop-images/dataservice:latest 
  name: dataservice
  agentType: java

frontgateservice:
  image: 771960604435.dkr.ecr.eu-west-1.amazonaws.com/workshop-images/frontgateservice:latest
  name: frontgateservice
  agentType: java   #java

webhookservice:
  image: 771960604435.dkr.ecr.eu-west-1.amazonaws.com/workshop-images/webhookservice:latest 
  name: webhookservice
  agentType: python

imageservice:
  image: 771960604435.dkr.ecr.eu-west-1.amazonaws.com/workshop-images/imageservice:latest
  name: imageservice
  agentType: dotnet-core

labelservice:
  image: 771960604435.dkr.ecr.eu-west-1.amazonaws.com/workshop-images/labelservice:latest
  name: labelservice
  agentType: nodejs

docservice:
  image: 771960604435.dkr.ecr.eu-west-1.amazonaws.com/workshop-images/docservice:latest
  name: docservice
  agentType: python   #python
