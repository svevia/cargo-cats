apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-{{ .Values.zapproxy.name }}-context"
  namespace: {{ .Release.Namespace | default "default" }}
data:
  cargocatszap.context: |
    <?xml version="1.0" encoding="UTF-8" standalone="no"?>
    <configuration>
        <context>
            <name>Default</name>
            <desc/>
            <inscope>true</inscope>
            <incregexes>http://cargocats.{{ template "simulation-console.baseUrl" . }}.*</incregexes>
            <tech>
                <include>Db</include>
                <include>Db.CouchDB</include>
                <include>Db.Firebird</include>
                <include>Db.HypersonicSQL</include>
                <include>Db.IBM DB2</include>
                <include>Db.MariaDB</include>
                <include>Db.Microsoft Access</include>
                <include>Db.Microsoft SQL Server</include>
                <include>Db.MongoDB</include>
                <include>Db.MySQL</include>
                <include>Db.Oracle</include>
                <include>Db.PostgreSQL</include>
                <include>Db.SAP MaxDB</include>
                <include>Db.SQLite</include>
                <include>Db.Sybase</include>
                <include>Language</include>
                <include>Language.ASP</include>
                <include>Language.C</include>
                <include>Language.JSP/Servlet</include>
                <include>Language.Java</include>
                <include>Language.Java.Spring</include>
                <include>Language.JavaScript</include>
                <include>Language.PHP</include>
                <include>Language.Python</include>
                <include>Language.Ruby</include>
                <include>Language.XML</include>
                <include>OS</include>
                <include>OS.Linux</include>
                <include>OS.MacOS</include>
                <include>OS.Windows</include>
                <include>SCM</include>
                <include>SCM.Git</include>
                <include>SCM.SVN</include>
                <include>WS</include>
                <include>WS.Apache</include>
                <include>WS.IIS</include>
                <include>WS.Tomcat</include>
            </tech>
            <urlparser>
                <class>org.zaproxy.zap.model.StandardParameterParser</class>
                <config>{"kvps":"&amp;","kvs":"=","struct":[]}</config>
            </urlparser>
            <postparser>
                <class>org.zaproxy.zap.model.StandardParameterParser</class>
                <config>{"kvps":"&amp;","kvs":"=","struct":[]}</config>
            </postparser>
            <authentication>
                <type>2</type>
                <strategy>POLL_URL</strategy>
                <pollurl>http://cargocats.{{ template "simulation-console.baseUrl" . }}/dashboard</pollurl>
                <polldata/>
                <pollfreq>60</pollfreq>
                <pollunits>REQUESTS</pollunits>
                <loggedin>\Q 200\E</loggedin>
                <loggedout>\Q 302\E</loggedout>
                <form>
                    <loginurl>http://cargocats.{{ template "simulation-console.baseUrl" . }}/login</loginurl>
                    <loginbody>username={%username%}&amp;password={%password%}</loginbody>
                    <loginpageurl>http://cargocats.{{ template "simulation-console.baseUrl" . }}/login</loginpageurl>
                </form>
            </authentication>
            <users>
                <user>0;true;YWRtaW4=;2;YWRtaW4=~cGFzc3dvcmQxMjM=~</user>
            </users>
            <forceduser>-1</forceduser>
            <session>
                <type>3</type>
            </session>
            <authorization>
                <type>0</type>
                <basic>
                    <header/>
                    <body/>
                    <logic>AND</logic>
                    <code>-1</code>
                </basic>
            </authorization>
        </context>
    </configuration>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Release.Name }}-{{ .Values.zapproxy.name }}"
  namespace: {{ .Release.Namespace | default "default" }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.zapproxy.name }}
  replicas: 1
  template:
    metadata:
      annotations:
        rollme: {{ randAlphaNum 5 | quote }}
      labels:
        app: {{ .Values.zapproxy.name }}
    spec:
{{- if .Values.nodeName }}
      nodeName: {{ .Values.nodeName }}
{{- end }}
{{- if .Values.aliashost }}
      hostAliases:
{{- range $host, $ip := .Values.aliashost }}
        - ip: "{{ $ip }}"
          hostnames:
            - "{{ $host }}"
{{- end }}
{{- end }}
      containers:
        - name: {{ .Values.zapproxy.name }}
          image: {{ .Values.zapproxy.image }}
          imagePullPolicy: IfNotPresent
          command: ["zap.sh", "-daemon", "-host", "0.0.0.0", "-port", "8080", "-config", "api.addrs.addr.name=.*", "-config", "api.addrs.addr.regex=true","-config", "api.disablekey=true" ]
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
          ports:
            - containerPort: 8080
              name: api
            - containerPort: 8090
              name: proxy
          startupProbe:
            httpGet:
              path: /JSON/core/view/version/
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 20  # Allow up to 5 minutes for startup (60s +15*15s = 285)
          readinessProbe:
            httpGet:
              path: /JSON/core/view/version/
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3  # After startup succeeds, be more strict
          livenessProbe:
            httpGet:
              path: /JSON/core/view/version/
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3  # Allow 90 seconds before restart (3*30s)
          volumeMounts:
            - name: zap-context
              mountPath: /zap/cargocatszap.context
              subPath: cargocatszap.context
          resources:
            requests:
              memory: "1Gi"
              cpu: "750m"
              ephemeral-storage: "3Gi"
            limits:
              memory: "4Gi"
              cpu: "2000m"
              ephemeral-storage: "4Gi"
      volumes:
        - name: zap-context
          configMap:
            name: "{{ .Release.Name }}-{{ .Values.zapproxy.name }}-context"
---
apiVersion: v1
kind: Service
metadata:
  name: zapproxy
  namespace: {{ .Release.Namespace | default "default" }}
spec:
  selector:
    app: {{ .Values.zapproxy.name }}
  ports:
    - protocol: TCP
      name: api
      port: 8080
      targetPort: 8080
    - protocol: TCP
      name: proxy
      port: 8090
      targetPort: 8090
