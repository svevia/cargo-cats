---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: '{{.Release.Name}}-{{ .Values.docservice.name }}'
  namespace: {{ .Release.Namespace }}
  labels:
    contrast-agent: {{ .Values.docservice.agentType }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.docservice.name }}
  replicas: 1
  template:
    metadata:
      annotations:
        rollme: {{ randAlphaNum 5 | quote }}
      labels:
        app: {{ .Values.docservice.name }}
    spec:
      containers:
        - name: {{ .Values.docservice.name }}
          image: {{ .Values.docservice.image }} 
          imagePullPolicy: IfNotPresent
          # Override the default command to fix worker timeout issues
          command: ["gunicorn"]
          args: [
            "--bind", "0.0.0.0:5000",
            "--workers", "2",
            "--worker-class", "sync", 
            "--timeout", "120",
            "--keep-alive", "2",
            "--max-requests", "1000",
            "--max-requests-jitter", "100",
            "--access-logfile", "-",
            "--error-logfile", "-",
            "--capture-output",
            "--log-level", "info",
            "app:app"
          ]
          env:
          - name: CONTRAST__APPLICATION__NAME
            value: '{{ .Values.contrast.uniqName }}-{{.Release.Name}}-{{ .Values.docservice.name }}'
          - name: CONTRAST__SERVER__NAME
            value: '{{ .Values.contrast.uniqName }}-{{.Release.Name}}-{{ .Values.docservice.name }}-agent'
          - name: FLASK_ENV
            value: 'development'
          - name: PYTHONUNBUFFERED
            value: '1'
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "320Mi"
              cpu: "50m"
              ephemeral-storage: "500Mi"
            limits:
              memory: "640Mi"
              cpu: "200m"
              ephemeral-storage: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.docservice.name }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Values.docservice.name }}
  ports:
    - name: http-port      
      protocol: TCP
      port: 5000           
      targetPort: 5000     
