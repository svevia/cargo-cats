apiVersion: apps/v1
kind: Deployment
metadata:
  name: '{{.Release.Name}}-{{ .Values.webhookservice.name }}'
  namespace: {{ .Release.Namespace }}
  labels:
    contrast-agent: {{ .Values.webhookservice.agentType }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.webhookservice.name }}
  replicas: 1
  template:
    metadata:
      annotations:
        rollme: {{ randAlphaNum 5 | quote }}
      labels:
        app: {{ .Values.webhookservice.name }}
    spec:
{{- if .Values.nodeName }}
      nodeName: {{ .Values.nodeName }}
{{- end }}
      containers:
        - name: {{ .Values.webhookservice.name }}
          image: {{ .Values.webhookservice.image }} 
          imagePullPolicy: IfNotPresent
          # Override the default command to fix worker timeout issues
          command: ["gunicorn"]
          args: [
            "--bind", "0.0.0.0:5000",
            "--workers", "2",
            "--worker-class", "sync", 
            "--timeout", "120",
            "--keep-alive", "2",
            "--max-requests", "1000",
            "--max-requests-jitter", "100",
            "--access-logfile", "-",
            "--error-logfile", "-",
            "--capture-output",
            "--log-level", "info",
            "app:app"
          ]
          env:
          - name: CONTRAST__APPLICATION__NAME
            value: '{{ .Values.contrast.uniqName }}-{{.Release.Name}}-{{ .Values.webhookservice.name }}'
          - name: CONTRAST__SERVER__NAME
            value: '{{ .Values.contrast.uniqName }}-{{.Release.Name}}-{{ .Values.webhookservice.name }}-agent'
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "250Mi"
              cpu: "400m"
              ephemeral-storage: "512Mi"
            limits:
              memory: "300Mi"
              cpu: "500m"
              ephemeral-storage: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: webhookservice
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Values.webhookservice.name }}
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
